<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Editor Plan Grădină – Proiect Șerban</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOOLBAR */
#toolbar{background:#16213e;padding:7px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:2px solid #0f3460;flex-shrink:0}
#toolbar h1{font-size:13px;color:#e94560;white-space:nowrap}
.mode-btn{padding:4px 12px;border-radius:10px;border:2px solid #555;cursor:pointer;font-size:12px;font-weight:700;background:#222;color:#fff;transition:all .15s}
.mode-btn.active{background:#e94560;border-color:#e94560;color:#fff}
#code-select{padding:4px 8px;border-radius:8px;border:1px solid #555;background:#222;color:#fff;font-size:12px;min-width:200px}
#search-box{padding:4px 8px;border-radius:8px;border:1px solid #555;background:#222;color:#fff;font-size:12px;width:130px}
.filter-btn{padding:3px 9px;border-radius:10px;border:1px solid #444;cursor:pointer;font-size:11px;font-weight:600;color:#fff}
.filter-btn.active{border-color:#e94560;box-shadow:0 0 5px #e94560}
.filter-btn[data-type="all"]{background:#333}
.filter-btn[data-type="arbore"]{background:#2d6a2d}
.filter-btn[data-type="fructifer"]{background:#c0392b}
.filter-btn[data-type="arbust"]{background:#8e44ad}
.filter-btn[data-type="aromat"]{background:#c7a200;color:#000}
.filter-btn[data-type="ierbacee"]{background:#1a7a9a}
#zbtn-wrap{display:flex;gap:4px;margin-left:auto}
.zbtn{background:#0f3460;border:none;color:#fff;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:15px}
.zbtn:hover{background:#e94560}
#hint{font-size:11px;color:#aaa;white-space:nowrap}

/* MAP */
#map-wrap{flex:1;overflow:hidden;position:relative}
#map-wrap.mode-add{cursor:crosshair}
#map-wrap.mode-view{cursor:grab}
#map-wrap.mode-view.grabbing{cursor:grabbing}
#map-wrap.mode-del{cursor:not-allowed}
#map-inner{position:absolute;transform-origin:0 0;user-select:none}
#plan-img{display:block;width:1200px;height:auto;pointer-events:none}

/* DOTS */
.pdot{
  position:absolute;width:13px;height:13px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.85);
  transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;transition:transform .12s;
}
.pdot:hover{transform:translate(-50%,-50%) scale(1.8);z-index:20}
.pdot.selected{transform:translate(-50%,-50%) scale(2);box-shadow:0 0 0 3px #ffe600;z-index:30}
.pdot[data-type="arbore"]{background:#2d6a2d}
.pdot[data-type="fructifer"]{background:#c0392b}
.pdot[data-type="arbust"]{background:#8e44ad}
.pdot[data-type="aromat"]{background:#c7a200}
.pdot[data-type="ierbacee"]{background:#1a7a9a}
.pdot.dimmed{opacity:0.2}

/* code label always visible */
.pdot-label{
  position:absolute;transform:translate(-50%,-100%);
  margin-top:-8px;font-size:9px;font-weight:800;
  color:#fff;background:rgba(0,0,0,0.72);
  padding:1px 3px;border-radius:3px;white-space:nowrap;
  pointer-events:none;z-index:11;
}

/* POPUP */
#popup{
  position:fixed;background:#16213e;border:1px solid #0f3460;border-radius:12px;
  padding:14px 16px;min-width:250px;max-width:300px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1000;display:none
}
#popup.visible{display:block}
#popup-close{position:absolute;top:8px;right:10px;background:none;border:none;color:#999;font-size:18px;cursor:pointer}
#popup-close:hover{color:#e94560}
#popup-code{font-size:22px;font-weight:800;color:#e94560}
#popup-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;color:#fff;margin-bottom:8px}
#popup-ro{font-size:15px;font-weight:600;margin-bottom:3px}
#popup-lat{font-size:12px;color:#aaa;font-style:italic;margin-bottom:10px}
.plinks{display:flex;flex-direction:column;gap:5px}
.plink{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600;transition:opacity .2s}
.plink:hover{opacity:.8}
.plink.wro{background:#1a5276;color:#85c1e9}
.plink.wen{background:#1e8449;color:#a9dfbf}
.plink.kew{background:#6e2f8a;color:#d7bde2}
#del-dot-btn{margin-top:10px;width:100%;padding:6px;background:#7b241c;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
#del-dot-btn:hover{background:#e74c3c}

/* EXPORT panel */
#export-panel{
  position:fixed;bottom:12px;left:12px;
  background:rgba(22,33,62,.95);border:1px solid #0f3460;border-radius:10px;
  padding:10px 14px;z-index:500;max-width:340px
}
#export-panel h4{color:#e94560;font-size:12px;margin-bottom:6px}
#export-area{width:100%;height:70px;background:#111;color:#7fff7f;font-size:10px;border:1px solid #333;border-radius:6px;padding:4px;resize:none;font-family:monospace}
.exp-btn{margin-top:5px;padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700}
#btn-export{background:#0f6e3a;color:#fff}
#btn-import{background:#0f3460;color:#fff}
#import-area{width:100%;height:50px;background:#111;color:#aef;font-size:10px;border:1px solid #333;border-radius:6px;padding:4px;resize:none;font-family:monospace;margin-top:4px;display:none}
#btn-do-import{display:none;margin-top:4px;padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:#8e44ad;color:#fff}

/* LEGEND */
#legend{position:fixed;bottom:12px;right:12px;background:rgba(22,33,62,.92);border:1px solid #0f3460;border-radius:10px;padding:10px 14px;font-size:11px;z-index:500}
#legend h4{margin-bottom:5px;font-size:12px;color:#e94560}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.leg-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.4)}
#dot-count{margin-top:6px;font-size:10px;color:#aaa}
</style>
</head>

  <span id="hint" style="color:#f39c12">← selectează cod, apoi click pe plan</span>

<script>
const DB = {"A5": {"ro": "Paltin de câmp", "lat": "Acer platanoides", "type": "arbore"}, "A11": {"ro": "Arborele de mătase", "lat": "Albizia julibrissin", "type": "arbore"}, "A21": {"ro": "Sălcioară", "lat": "Elaeagnus angustifolia", "type": "arbore"}, "A24": {"ro": "Frasin", "lat": "Fraxinus excelsior", "type": "arbore"}, "A28": {"ro": "Arborele de lalea", "lat": "Liriodendron tulipifera", "type": "arbore"}, "A30": {"ro": "Magnolie", "lat": "Magnolia x soulangiana", "type": "arbore"}, "A34": {"ro": "Pin negru", "lat": "Pinus nigra", "type": "arbore"}, "A40": {"ro": "Stejar pufos", "lat": "Quercus pubescens", "type": "arbore"}, "A43": {"ro": "Salcie plângătoare", "lat": "Salix babylonica", "type": "arbore"}, "A48": {"ro": "Tei argintiu", "lat": "Tilia tomentosa", "type": "arbore"}, "A52": {"ro": "Ulm de Turkestan", "lat": "Ulmus pumila", "type": "arbore"}, "F1": {"ro": "Alun", "lat": "Corylus avellana", "type": "fructifer"}, "F3": {"ro": "Kaki", "lat": "Diospyros oblonga", "type": "fructifer"}, "F4": {"ro": "Smochin", "lat": "Ficus carica", "type": "fructifer"}, "F6": {"ro": "Nuc", "lat": "Juglans regia", "type": "fructifer"}, "F7": {"ro": "Măr", "lat": "Malus domestica", "type": "fructifer"}, "F8": {"ro": "Moșmon", "lat": "Mespilus germanica", "type": "fructifer"}, "F9": {"ro": "Dud alb", "lat": "Morus alba", "type": "fructifer"}, "F10": {"ro": "Cireș", "lat": "Prunus avium", "type": "fructifer"}, "F11": {"ro": "Corcoduș", "lat": "Prunus cerasifera", "type": "fructifer"}, "F12": {"ro": "Vișin", "lat": "Prunus cerasus", "type": "fructifer"}, "F14": {"ro": "Migdal", "lat": "Prunus dulcis", "type": "fructifer"}, "F15": {"ro": "Piersic", "lat": "Prunus persica", "type": "fructifer"}, "F16": {"ro": "Rodiu", "lat": "Punica granatum", "type": "fructifer"}, "F17": {"ro": "Păr", "lat": "Pyrus communis", "type": "fructifer"}, "F18": {"ro": "Jujuba", "lat": "Ziziphus jujuba", "type": "fructifer"}, "F19": {"ro": "Pom de stafide", "lat": "Amelanchier larnackii", "type": "fructifer"}, "F21": {"ro": "Corn", "lat": "Cornus mas", "type": "fructifer"}, "F26": {"ro": "Cătină", "lat": "Hippophae rhamnoides", "type": "fructifer"}, "F28": {"ro": "Măceș", "lat": "Rosa canina", "type": "fructifer"}, "F29": {"ro": "Coacăz roșu", "lat": "Ribes rubrum", "type": "fructifer"}, "F30": {"ro": "Coacăz negru", "lat": "Ribes nigrum", "type": "fructifer"}, "F31": {"ro": "Coacăz alb", "lat": "Ribes glandulosum", "type": "fructifer"}, "F32": {"ro": "Agriș", "lat": "Ribes uva-crispa", "type": "fructifer"}, "F33": {"ro": "Viță de vie (existent)", "lat": "Vitis vinifera", "type": "fructifer"}, "F34": {"ro": "Arbore de mazăre", "lat": "Caragana arborescens", "type": "fructifer"}, "F44": {"ro": "Sânger", "lat": "Cornus sanguinea", "type": "fructifer"}, "F53": {"ro": "Prun", "lat": "Prunus domestica", "type": "fructifer"}, "F56": {"ro": "Nectarin", "lat": "Prunus persica var. nucipersica", "type": "fructifer"}, "F59": {"ro": "Aronia", "lat": "Aronia melanocarpa", "type": "fructifer"}, "S3": {"ro": "Iasomie falsă", "lat": "Philadelphus coronarius", "type": "arbust"}, "S4": {"ro": "Scumpie", "lat": "Cotinus coggygria", "type": "arbust"}, "S5": {"ro": "Păducel", "lat": "Crataegus monogyna", "type": "arbust"}, "S6": {"ro": "Hibiscus", "lat": "Hibiscus syriacus", "type": "arbust"}, "S10": {"ro": "Salcâm galben", "lat": "Laburnum anagyroides", "type": "arbust"}, "S11": {"ro": "Photinia", "lat": "Photinia serrulata", "type": "arbust"}, "S17": {"ro": "Oțetar", "lat": "Rhus typhina", "type": "arbust"}, "S18": {"ro": "Soc", "lat": "Sambucus nigra", "type": "arbust"}, "S21": {"ro": "Liliac", "lat": "Syringa vulgaris", "type": "arbust"}, "S28": {"ro": "Ploaie de aur", "lat": "Forsythia x intermedia", "type": "arbust"}, "S34": {"ro": "Lemn câinesc", "lat": "Ligustrum ovalifolium", "type": "arbust"}, "S38": {"ro": "Cununiță", "lat": "Spiraea japonica", "type": "arbust"}, "S50": {"ro": "Kerria", "lat": "Kerria japonica", "type": "arbust"}, "S69": {"ro": "Trandafir cățărător", "lat": "Rosa 'Rose de Rescht'", "type": "arbust"}, "S72": {"ro": "Călin", "lat": "Viburnum opulus", "type": "arbust"}, "S80": {"ro": "Liliac de vară", "lat": "Buddleja davidii", "type": "arbust"}, "ar2": {"ro": "Lavandă", "lat": "Lavandula angustifolia", "type": "aromat"}, "ar6": {"ro": "Rozmarin", "lat": "Rosmarinus officinalis", "type": "aromat"}, "ar7": {"ro": "Salvie", "lat": "Salvia officinalis", "type": "aromat"}, "ar9": {"ro": "Roiniță", "lat": "Melissa officinalis", "type": "aromat"}, "ia19": {"ro": "Fenicul", "lat": "Foeniculum vulgare", "type": "ierbacee"}, "ip19": {"ro": "Tătăneasă", "lat": "Symphytum officinale", "type": "ierbacee"}, "ip44": {"ro": "Isop", "lat": "Hyssopus officinalis", "type": "ierbacee"}, "ip102": {"ro": "Lofantus", "lat": "Lophantus anisatus", "type": "ierbacee"}, "ip126": {"ro": "Potentilla", "lat": "Potentilla fruticosa", "type": "ierbacee"}};

const typeColors = {arbore:'#2d6a2d',fructifer:'#c0392b',arbust:'#8e44ad',aromat:'#c7a200',ierbacee:'#1a7a9a'};
const typeLabelRO = {arbore:'Arbore',fructifer:'Fructifer',arbust:'Arbust',aromat:'Aromatic',ierbacee:'Ierbacee'};

// State
let points = []; // {id, code, x_pct, y_pct}  x_pct/y_pct = % of image natural size
let nextId = 1;
let mode = 'view'; // 'view' | 'add'
let scale = 1, tx = 0, ty = 0;
let isDragging = false, startX, startY, startTx, startTy;
let currentFilter = 'all', currentSearch = '';
let selectedId = null;

const mapWrap  = document.getElementById('map-wrap');
const mapInner = document.getElementById('map-inner');
const planImg  = document.getElementById('plan-img');
const dotsLayer= document.getElementById('dots-layer');
const popup    = document.getElementById('popup');
const codeSelect = document.getElementById('code-select');

// Transform
function applyTransform() {
  mapInner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
function setScale(s, cx, cy) {
  const rect = mapWrap.getBoundingClientRect();
  cx = cx ?? rect.width/2; cy = cy ?? rect.height/2;
  const old = scale;
  scale = Math.max(0.15, Math.min(8, s));
  tx = cx - (cx-tx)*(scale/old);
  ty = cy - (cy-ty)*(scale/old);
  applyTransform();
}

// Image dimensions
function imgDisplayW() { return planImg.offsetWidth || 1200; }
function imgDisplayH() { return planImg.offsetHeight || 850; }

// Add point
function addPoint(code, xPct, yPct) {
  const p = { id: nextId++, code, x_pct: xPct, y_pct: yPct };
  points.push(p);
  renderDot(p);
  updateCount();
  return p;
}

function renderDot(p) {
  const info = DB[p.code] || {ro:p.code, lat:'?', type:'arbore'};
  const w = imgDisplayW(), h = imgDisplayH();

  // dot
  const dot = document.createElement('div');
  dot.className = 'pdot';
  dot.dataset.type = info.type;
  dot.dataset.id = p.id;
  dot.style.left = (p.x_pct/100*w)+'px';
  dot.style.top  = (p.y_pct/100*h)+'px';
  dot.style.background = typeColors[info.type]||'#888';

  // label
  const lbl = document.createElement('div');
  lbl.className = 'pdot-label';
  lbl.textContent = p.code;
  lbl.style.left = (p.x_pct/100*w)+'px';
  lbl.style.top  = (p.y_pct/100*h)+'px';

  dot.addEventListener('click', e => {
    e.stopPropagation();
    if (mode === 'view') showPopupForId(p.id, e.clientX, e.clientY);
  });

  dotsLayer.appendChild(dot);
  dotsLayer.appendChild(lbl);
  applyFilter();
}

function rebuildAllDots() {
  dotsLayer.innerHTML = '';
  points.forEach(renderDot);
}

function repositionDots() {
  const w = imgDisplayW(), h = imgDisplayH();
  document.querySelectorAll('.pdot').forEach(dot => {
    const pid = parseInt(dot.dataset.id);
    const p = points.find(x=>x.id===pid);
    if (p) { dot.style.left=(p.x_pct/100*w)+'px'; dot.style.top=(p.y_pct/100*h)+'px'; }
  });
  document.querySelectorAll('.pdot-label').forEach((lbl,i) => {
    // labels are at odd indices in dotsLayer children
    const dot = dotsLayer.children[i*2];
    if (dot) { lbl.style.left = dot.style.left; lbl.style.top = dot.style.top; }
  });
}

// Mode buttons
document.getElementById('btn-view').addEventListener('click', () => setMode('view'));
document.getElementById('btn-add').addEventListener('click',  () => setMode('add'));

function setMode(m) {
  mode = m;
  mapWrap.className = 'mode-'+m;
  document.getElementById('btn-view').classList.toggle('active', m==='view');
  document.getElementById('btn-add').classList.toggle('active', m==='add');
  document.getElementById('hint').style.display = m==='add' ? 'inline' : 'none';
}
setMode('view');

// Click on map → add point
mapWrap.addEventListener('click', e => {
  if (mode !== 'add') return;
  if (isDragging) return;
  // Convert client coords to image %
  const rect = planImg.getBoundingClientRect();
  const xPx = (e.clientX - rect.left);
  const yPx = (e.clientY - rect.top);
  const xPct = xPx / rect.width * 100;
  const yPct = yPx / rect.height * 100;
  if (xPct<0||xPct>100||yPct<0||yPct>100) return;
  const code = codeSelect.value;
  addPoint(code, xPct, yPct);
});

// Show popup
function showPopupForId(id, cx, cy) {
  selectedId = id;
  const p = points.find(x=>x.id===id);
  if (!p) return;
  const info = DB[p.code]||{ro:p.code,lat:'?',type:'arbore'};
  document.getElementById('popup-code').textContent = p.code;
  const badge = document.getElementById('popup-badge');
  badge.textContent = typeLabelRO[info.type]||info.type;
  badge.style.background = typeColors[info.type]||'#888';
  document.getElementById('popup-ro').textContent = info.ro;
  document.getElementById('popup-lat').textContent = info.lat;
  const latClean = info.lat.split('(')[0].trim().replace(/[' ]/g,s=>s===' '?'_':'');
  document.getElementById('lro').href  = 'https://ro.wikipedia.org/wiki/'+latClean;
  document.getElementById('len').href  = 'https://en.wikipedia.org/wiki/'+latClean;
  document.getElementById('lkew').href = 'https://powo.science.kew.org/taxon/urn:lsid:ipni.org:names:search?q='+info.lat.split(' ').slice(0,2).join('+');
  // position
  const pw=300,ph=220,vw=window.innerWidth,vh=window.innerHeight;
  let px=cx+14,py=cy+14;
  if(px+pw>vw) px=cx-pw-14;
  if(py+ph>vh) py=cy-ph-14;
  popup.style.left=px+'px'; popup.style.top=py+'px';
  popup.classList.add('visible');
  document.querySelectorAll('.pdot').forEach(d=>d.classList.remove('selected'));
  const dot = dotsLayer.querySelector(`.pdot[data-id="${id}"]`);
  if(dot) dot.classList.add('selected');
}

// Delete from popup
document.getElementById('del-dot-btn').addEventListener('click', () => {
  if (selectedId===null) return;
  points = points.filter(p=>p.id!==selectedId);
  rebuildAllDots();
  popup.classList.remove('visible');
  selectedId = null;
  updateCount();
});

document.getElementById('popup-close').addEventListener('click', () => {
  popup.classList.remove('visible');
  document.querySelectorAll('.pdot').forEach(d=>d.classList.remove('selected'));
});
document.addEventListener('click', e => {
  if(!popup.contains(e.target) && !e.target.classList.contains('pdot')){
    popup.classList.remove('visible');
    document.querySelectorAll('.pdot').forEach(d=>d.classList.remove('selected'));
  }
});

// Filter
function applyFilter() {
  document.querySelectorAll('.pdot').forEach(dot => {
    const pid = parseInt(dot.dataset.id);
    const p = points.find(x=>x.id===pid);
    if(!p) return;
    const info = DB[p.code]||{type:'arbore',ro:p.code};
    const matchType = currentFilter==='all' || info.type===currentFilter;
    const matchSearch = !currentSearch ||
      p.code.toLowerCase().includes(currentSearch) ||
      info.ro.toLowerCase().includes(currentSearch) ||
      info.lat.toLowerCase().includes(currentSearch);
    dot.classList.toggle('dimmed', !(matchType&&matchSearch));
  });
  // labels same
  document.querySelectorAll('.pdot-label').forEach((lbl,i) => {
    const dot = dotsLayer.children[i*2];
    if(dot) lbl.style.opacity = dot.classList.contains('dimmed') ? '0.15' : '1';
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.type;
    applyFilter();
  });
});
document.getElementById('search-box').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase().trim();
  applyFilter();
});

// Zoom
document.getElementById('zin').addEventListener('click', ()=>setScale(scale*1.3));
document.getElementById('zout').addEventListener('click', ()=>setScale(scale/1.3));
document.getElementById('zreset').addEventListener('click', ()=>{scale=1;tx=0;ty=0;applyTransform();});
mapWrap.addEventListener('wheel', e=>{ e.preventDefault(); setScale(scale*(e.deltaY<0?1.12:0.88),e.clientX,e.clientY); }, {passive:false});

// Pan
mapWrap.addEventListener('mousedown', e=>{
  if(e.target.classList.contains('pdot')||mode==='add') return;
  isDragging=true; startX=e.clientX; startY=e.clientY; startTx=tx; startTy=ty;
  mapWrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  tx=startTx+(e.clientX-startX); ty=startTy+(e.clientY-startY);
  applyTransform();
});
window.addEventListener('mouseup', ()=>{ isDragging=false; mapWrap.classList.remove('grabbing'); });

// Touch
let ltd=null,ltm=null;
mapWrap.addEventListener('touchstart',e=>{
  if(e.touches.length===1){ isDragging=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; startTx=tx; startTy=ty; }
  else if(e.touches.length===2){
    isDragging=false;
    ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    ltm={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }
},{passive:true});
mapWrap.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&isDragging){ tx=startTx+(e.touches[0].clientX-startX); ty=startTy+(e.touches[0].clientY-startY); applyTransform(); }
  else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(ltd) setScale(scale*d/ltd,ltm.x,ltm.y); ltd=d;
  }
},{passive:true});
mapWrap.addEventListener('touchend',()=>{isDragging=false;ltd=null;});

// Export/Import
document.getElementById('btn-export').addEventListener('click', ()=>{
  const data = points.map(p=>{
    const info=DB[p.code]||{ro:p.code,lat:'?',type:'arbore'};
    return {code:p.code,x_pct:+p.x_pct.toFixed(3),y_pct:+p.y_pct.toFixed(3),ro:info.ro};
  });
  document.getElementById('export-area').value = JSON.stringify(data,null,2);
});

document.getElementById('btn-import').addEventListener('click', ()=>{
  const ia=document.getElementById('import-area');
  const bdi=document.getElementById('btn-do-import');
  ia.style.display = ia.style.display==='none'?'block':'none';
  bdi.style.display = bdi.style.display==='none'?'block':'none';
});

document.getElementById('btn-do-import').addEventListener('click', ()=>{
  try{
    const data = JSON.parse(document.getElementById('import-area').value);
    points=[];nextId=1;
    data.forEach(p=>addPoint(p.code, p.x_pct, p.y_pct));
    document.getElementById('import-area').style.display='none';
    document.getElementById('btn-do-import').style.display='none';
    alert('Import OK: '+data.length+' puncte');
  }catch(e){alert('Eroare JSON: '+e.message);}
});

document.getElementById('btn-clear-all').addEventListener('click', ()=>{
  if(confirm('Ștergi toate punctele?')){ points=[]; rebuildAllDots(); updateCount(); }
});

function updateCount() {
  document.getElementById('dot-count').textContent = 'Puncte: '+points.length;
}

// Reposition on resize
window.addEventListener('resize', repositionDots);
planImg.addEventListener('load', repositionDots);
window.addEventListener('load', repositionDots);
</script>
